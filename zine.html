<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國小英語 8頁折疊小書產生器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ==========================================
           列印專用設定 (保證完美滿版 A4)
           ========================================== */
        @media print {
            @page {
                size: A4 landscape; /* 強制 A4 橫向 */
                margin: 0; /* 移除預設邊距 */
            }
            body {
                margin: 0;
                padding: 0;
                background: white;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            /* 隱藏所有操作介面 */
            .no-print { display: none !important; }
            
            #zine-grid-container {
                width: 297mm;
                height: 210mm;
                margin: 0;
                padding: 0;
                border: none;
                box-shadow: none;
                transform: none !important;
            }
        }

        /* 螢幕預覽模式設定 */
        @media screen {
            body { background-color: #f8fafc; }
            #zine-grid-container {
                width: 297mm;
                height: 210mm;
                background: white;
                margin: 20px auto;
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            }
        }

        /* 網格與虛線、實線設定 */
        .zine-grid {
            display: grid;
            grid-template-columns: repeat(4, 25%);
            grid-template-rows: repeat(2, 50%);
            box-sizing: border-box;
        }
        
        .zine-cell {
            box-sizing: border-box;
            padding: 4mm;
            border-right: 1.5px dashed #cbd5e1;
            border-bottom: 1.5px dashed #cbd5e1;
            position: relative;
            overflow: hidden;
        }

        /* 移除最外層網格線 */
        .zine-cell:nth-child(4n) { border-right: none; }
        .zine-cell:nth-child(n+5) { border-bottom: none; }
        
        /* 中間的【剪裁線】(位於 Cell 2 和 Cell 3 的底部) */
        .cut-border {
            border-bottom: 2.5px solid #1e293b !important;
        }
    </style>
</head>
<body class="font-sans text-slate-800">

    <!-- ==========================================
         控制面板 (僅在螢幕顯示，列印時隱藏)
         ========================================== -->
    <div class="no-print bg-slate-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-xl font-bold flex items-center gap-2">
                    <span>📖</span> 國小英語 Zine 小書產生器
                </h1>
                <p class="text-slate-400 text-sm mt-1">選擇年級後，點擊列印。沿著中央「黑色實線」剪一刀即可折疊成冊。</p>
            </div>
            
            <div class="flex items-center gap-2">
                <button onclick="renderZine(0)" id="btn-0" class="grade-btn px-4 py-2 rounded-lg font-bold transition-colors bg-indigo-600 hover:bg-indigo-500">3年級</button>
                <button onclick="renderZine(1)" id="btn-1" class="grade-btn px-4 py-2 rounded-lg font-bold transition-colors bg-slate-700 hover:bg-slate-600">4年級</button>
                <button onclick="renderZine(2)" id="btn-2" class="grade-btn px-4 py-2 rounded-lg font-bold transition-colors bg-slate-700 hover:bg-slate-600">5年級</button>
                <button onclick="renderZine(3)" id="btn-3" class="grade-btn px-4 py-2 rounded-lg font-bold transition-colors bg-slate-700 hover:bg-slate-600">6年級</button>
                <div class="w-px h-8 bg-slate-600 mx-2"></div>
                <button onclick="window.print()" class="px-5 py-2 bg-emerald-500 hover:bg-emerald-400 text-slate-900 rounded-lg font-extrabold shadow-md flex items-center gap-2 transition-transform hover:scale-105">
                    🖨️ 列印 A4
                </button>
            </div>
        </div>
    </div>

    <!-- 水平捲動區域 (避免小螢幕破版) -->
    <div class="w-full overflow-x-auto no-print-scroll pb-10">
        <!-- ==========================================
             Zine 網格容器 (A4 實體尺寸)
             ========================================== -->
        <div id="zine-grid-container" class="zine-grid">
            <!-- 內容由 JavaScript 動態生成 -->
        </div>
    </div>

                    { title: "Unit 7: What Would You Like?", sentence: { en: "What would you like for lunch? I'd like some salad.", zh: "午餐想吃什麼？沙拉。" }, vocab: [{ en: "breakfast", zh: "早餐" }, { en: "lunch", zh: "午餐" }, { en: "dinner", zh: "晚餐" }, { en: "chicken", zh: "雞肉" }, { en: "salad", zh: "沙拉" }], phonics: { rule: "複合子音 ch, sh", tip: "ch 像「七」(短促有力)，sh 像「噓」(長音)" } },

        // ==========================================
        // 2. 渲染邏輯 (物理排版映射)
        // ==========================================
        function renderZine(gradeIndex) {
            const grade = zineData[gradeIndex];
            const grid = document.getElementById('zine-grid-container');
            grid.innerHTML = '';

            // 更新按鈕樣式
            document.querySelectorAll('.grade-btn').forEach((btn, idx) => {
                if (idx === gradeIndex) {
                    btn.className = "grade-btn px-4 py-2 rounded-lg font-bold transition-colors bg-indigo-600 hover:bg-indigo-500 text-white shadow-md transform scale-105";
                } else {
                    btn.className = "grade-btn px-4 py-2 rounded-lg font-bold transition-colors bg-slate-700 hover:bg-slate-600 text-white";
                }
            });

            // Zine 小書排版映射：
            // 折疊後要順序正確，A4紙上的分佈必須是這樣：
            // 頂部列 (需倒轉 180度)： 第2頁(U2), 第3頁(U3), 第4頁(U4), 第5頁(U5)
            // 底部列 (正向)：        第1頁(U1/封面), 第8頁(U8/封底), 第7頁(U7), 第6頁(U6)
            
            const layoutOrder = [
                { unitIdx: 1, rotated: true, isCut: false },
                { unitIdx: 2, rotated: true, isCut: true, hasScissor: true },  // 中央剪裁線
                { unitIdx: 3, rotated: true, isCut: true },                    // 中央剪裁線
                { unitIdx: 4, rotated: true, isCut: false },
                { unitIdx: 0, rotated: false, isCut: false, isCover: true },   // 封面
                { unitIdx: 7, rotated: false, isCut: false, isBackCover: true }, // 封底
                { unitIdx: 6, rotated: false, isCut: false },
                { unitIdx: 5, rotated: false, isCut: false }
            ];

            layoutOrder.forEach((config) => {
                const unit = grade.units[config.unitIdx];
                const pageNum = config.unitIdx + 1; // 頁碼對應 Unit 編號
                
                const cell = document.createElement('div');
                cell.className = `zine-cell ${config.isCut ? 'cut-border' : ''} bg-white`;

                // 控制旋轉的內部容器
                const inner = document.createElement('div');
                inner.className = `w-full h-full flex flex-col ${config.rotated ? 'rotate-180' : ''}`;

                // 生成內容 HTML
                let contentHTML = `
                    ${config.isCover ? `<div class="text-center mb-1.5"><span class="bg-indigo-700 text-white text-[11px] font-black px-3 py-1 rounded-full shadow-sm">🏆 ${grade.name} 英語總複習</span></div>` : ''}
                    
                    <div class="text-center mb-2 ${config.isCover ? 'mt-1' : 'mt-2'}">
                        <h2 class="text-[16px] font-black text-indigo-900 leading-tight">${unit.title}</h2>
                    </div>

                    <!-- 句型區塊 -->
                    <div class="mb-2 w-full">
                        <span class="inline-block bg-indigo-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-md mb-0.5 shadow-sm">⭐ 實用句型</span>
                        <div class="bg-indigo-50 p-1.5 rounded-lg text-[13px] text-indigo-950 font-bold border border-indigo-100">
                            ${unit.sentence.en}<br>
                            <span class="text-[11px] text-indigo-700 font-normal mt-0.5 inline-block">${unit.sentence.zh}</span>
                        </div>
                    </div>

                    <!-- 單字區塊 -->
                    <div class="mb-2 w-full flex-1">
                        <span class="inline-block bg-emerald-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-md mb-0.5 shadow-sm">📚 主題單字</span>
                        <div class="flex flex-wrap gap-x-2 gap-y-1 mt-0.5 text-[12px] bg-emerald-50/50 p-1.5 rounded-lg border border-emerald-100">
                            ${unit.vocab.map(v => `<span class="font-bold text-slate-800">${v.en} <span class="text-[10px] text-slate-500 font-normal">(${v.zh})</span></span>`).join('')}
                        </div>
                    </div>

                    <!-- 發音秘訣區塊 (置底) -->
                    <div class="mt-auto w-full pb-3">
                        <span class="inline-block bg-orange-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-md mb-0.5 shadow-sm">🎧 發音秘訣</span>
                        <div class="bg-orange-50 p-1.5 rounded-lg text-[12px] border border-orange-200">
                            <span class="font-bold text-orange-900">${unit.phonics.rule}</span><br>
                            <span class="text-[11px] text-orange-700 mt-0.5 block leading-tight">${unit.phonics.tip}</span>
                        </div>
                    </div>
                    
                    <!-- 封底姓名欄 -->
                    ${config.isBackCover ? `<div class="absolute bottom-3 left-0 right-0 text-center text-[12px] font-bold text-slate-600 border-t border-dashed border-slate-300 pt-1.5 mx-4">班級：________ 姓名：________</div>` : ''}
                    
                    <!-- 頁碼 -->
                    <div class="absolute ${config.isCover || config.isBackCover ? 'bottom-2' : 'bottom-1'} right-2 text-[10px] text-slate-300 font-bold">P${pageNum}</div>
                `;

                inner.innerHTML = contentHTML;
                cell.appendChild(inner);

                // 在需要剪開的黑線處加上剪刀圖示
                if (config.hasScissor) {
                    const scissor = document.createElement('div');
                    scissor.className = "absolute -bottom-3 right-0 text-[18px] z-50 transform translate-x-1/2 bg-white rounded-full leading-none px-1";
                    scissor.innerHTML = "✂️";
                    cell.appendChild(scissor);
                }

                grid.appendChild(cell);
            });
        }

        // 初始化：預設顯示三年級
        window.onload = () => {
            renderZine(0);
        };
    </script>
</body>
</html>
