<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國小英語總複習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(0); }
        }
        .animate-bounce-subtle {
            animation: bounce-subtle 2s infinite ease-in-out;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hidden-view {
            display: none !important;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

            </div>

            <!-- 模組 B: 發音 -->

                <h2 class="text-2xl font-bold text-slate-800 mb-4">Phonics 聽力</h2>
                <div class="space-y-3" id="menu-phonics-container"></div>
            </div>

            <!-- 模組 C: 句型 -->

                <div class="space-y-3" id="menu-sentences-container"></div>
            </div>
        </div>

        <!-- ================= 新增：連到 Zine 小書的引導區塊 ================= -->
        <div class="mt-8 w-full max-w-5xl fade-in">
            <div class="bg-indigo-50 border-2 border-indigo-100 rounded-3xl p-6 sm:p-8 flex flex-col sm:flex-row items-center justify-between shadow-sm hover:shadow-md transition-shadow">
                <div class="text-center sm:text-left mb-4 sm:mb-0">
                    <h3 class="text-2xl font-extrabold text-indigo-800 flex items-center justify-center sm:justify-start gap-2">
                        🖨️ 課後實體任務：8頁折疊小書
                    </h3>
                    <p class="text-indigo-600 font-medium mt-2">闖關完成了嗎？印出專屬的紙本複習小冊，帶回家動手摺吧！</p>
                </div>
                <!-- a 標籤使用 target="_blank" 可以在新分頁打開，不會關掉原本的闖關遊戲 -->
                <a href="zine.html" target="_blank" class="w-full sm:w-auto px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-lg rounded-2xl shadow-lg shadow-indigo-200 transition-transform hover:-translate-y-1 flex items-center justify-center gap-2">
                    前往列印產生器 ➡️
                </a>
            </div>
        </div>
        <!-- ============================================================= -->

    </div>

    <div id="game-header" class="hidden-view w-full max-w-3xl mx-auto pt-6 px-6 flex justify-between items-center mb-8 fade-in">
        <button onclick="goHome()" class="flex items-center gap-2 text-slate-500 hover:text-slate-800 bg-white px-4 py-2 rounded-full shadow-sm font-bold transition-colors">
            ⬅️ 返回
        </button>

            </div>

            </div>
        </div>
    </div>

    <div id="view-vocab" class="hidden-view min-h-screen bg-blue-50 flex-col items-center px-6 pb-6">

            <div id="vocab-options" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>

    </div>

    <div id="view-phonics" class="hidden-view min-h-screen bg-orange-50 flex-col items-center px-6 pb-6">

    <div id="view-sentences" class="hidden-view min-h-screen bg-emerald-50 flex-col items-center px-6 pb-6">

    </div>

    <div id="view-result" class="hidden-view min-h-screen bg-slate-50 flex-col items-center justify-center p-6">

            <div class="flex flex-col gap-4">

                </button>

                    🔄 返回主選單

            </div>
        </div>
    </div>

    <div id="view-review" class="hidden-view min-h-screen bg-slate-100 flex-col items-center p-6 pb-20">
        <div class="w-full max-w-2xl mx-auto mt-6 mb-6 flex justify-between items-center fade-in">

            <button onclick="switchView('result')" class="px-4 py-2 bg-white text-slate-600 rounded-full font-bold shadow-sm hover:text-indigo-600 transition-colors">

            </button>
        </div>
        
        <div id="review-container" class="w-full max-w-2xl flex flex-col gap-4 fade-in">

    </div>

                        { zh: "你要去哪裡？", words: ["Where", "are", "you", "going", "?"] },
                        { zh: "有幾隻獅子？", words: ["How", "many", "lions", "are", "there", "?"] },
                        { zh: "怎麼了？", words: ["What's", "wrong", "?"] },
                        { zh: "你有發燒嗎？", words: ["Do", "you", "have", "a", "fever", "?"] }
                    ]
                },

                    id: 's4',
                    category: "6年級: 過去式大挑戰",
                    questions: [
                        { zh: "你來自哪裡？", words: ["Where", "are", "you", "from", "?"] },
                        { zh: "我週末去慢跑。", words: ["I", "go", "jogging", "on", "weekends", "."] },
                        { zh: "你昨天在哪裡？", words: ["Where", "were", "you", "yesterday", "?"] },
                        { zh: "你昨天晚上做了什麼？", words: ["What", "did", "you", "do", "last", "night", "?"] },
                        { zh: "我昨天打掃房間。", words: ["I", "cleaned", "my", "room", "yesterday", "."] }
                    ]
                }

        };

        let currentMode = ''; 
        let currentCategoryData = null;
        let currentQuestionIndex = 0;
        let score = 0;
        let totalQuestions = 0;
        let isProcessing = false;

        let availableWords = [];
        let selectedWords = [];

        let timerInterval = null;
        let timeLeft = 0;
        let currentTimeLimit = 0;

        // 錯題檢討專用變數
        let wrongAnswers = [];
        let currentQuestionAttempted = false; // 追蹤該題是否已作答過(防止重複記錄)

        const views = {
            menu: document.getElementById('view-menu'),
            vocab: document.getElementById('view-vocab'),
            phonics: document.getElementById('view-phonics'),
            sentences: document.getElementById('view-sentences'),
            result: document.getElementById('view-result'),
            review: document.getElementById('view-review'),
            header: document.getElementById('game-header')
        };

        const uiElements = {
            progress: document.getElementById('ui-progress'),
            score: document.getElementById('ui-score'),
            timer: document.getElementById('ui-timer'),
            timerContainer: document.getElementById('ui-timer-container')
        };

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; 
                const voices = window.speechSynthesis.getVoices();
                const usVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Female'));
                if(usVoice) utterance.voice = usVoice;
                
                window.speechSynthesis.speak(utterance);
            }
        }

        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
        }

        function playCurrentAudio() {
            if(!currentCategoryData) return;
            const q = currentCategoryData.questions[currentQuestionIndex];
            if(currentMode === 'vocab') speak(q.en);
            if(currentMode === 'phonics') speak(q.word);
            if(currentMode === 'sentences') speak(q.words.join(' '));
        }

        function switchView(targetViewId) {
            Object.values(views).forEach(v => v.classList.add('hidden-view'));
            
            if(targetViewId === 'menu' || targetViewId === 'result' || targetViewId === 'review') {
                views.header.classList.add('hidden-view');
            } else {
                views.header.classList.remove('hidden-view');
            }
            
            views[targetViewId].classList.remove('hidden-view');
            views[targetViewId].style.display = 'flex';
            
            if(targetViewId === 'menu') {
                 Object.values(views).forEach(v => v.style.display = '');
                 views.menu.classList.remove('hidden-view');
            }
        }

        function goHome() {
            window.speechSynthesis.cancel();
            stopTimer();
            switchView('menu');
        }

        function startTimer() {
            clearInterval(timerInterval);
            
            // 單字與發音 5 秒，句型 15 秒
            if (currentMode === 'vocab' || currentMode === 'phonics') {
                currentTimeLimit = 5;
            } else {
                currentTimeLimit = 15;
            }
            
            timeLeft = currentTimeLimit;
            uiElements.timer.textContent = timeLeft;
            uiElements.timerContainer.classList.remove('bg-red-100', 'text-red-600', 'animate-pulse');
            uiElements.timerContainer.classList.add('bg-white', 'text-slate-700');

            timerInterval = setInterval(() => {
                timeLeft--;
                uiElements.timer.textContent = timeLeft;

                const warningTime = currentTimeLimit === 5 ? 2 : 5;

                if (timeLeft <= warningTime && timeLeft > 0) {
                    uiElements.timerContainer.classList.remove('bg-white', 'text-slate-700');
                    uiElements.timerContainer.classList.add('bg-red-100', 'text-red-600', 'animate-pulse');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timeUp();
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        function timeUp() {
            if (isProcessing) return;
            isProcessing = true;
            
            speak("Time is up");

            const q = currentCategoryData.questions[currentQuestionIndex];
            
            // 如果超時還沒作答過，記錄為錯題
            if (!currentQuestionAttempted) {
                let correctAns = currentMode === 'sentences' ? q.words.join(' ') : (q.zh || q.word);
                wrongAnswers.push({
                    type: currentMode,
                    en: q.en || q.word || "時間到未作答",
                    zh: q.zh || "聽力題",
                    correct: correctAns,
                    studentAns: "超時未作答"
                });
                currentQuestionAttempted = true;
            }

            if (currentMode === 'vocab' || currentMode === 'phonics') {
                const optsContainer = document.getElementById(currentMode + '-options');
                const allBtns = optsContainer.children;
                for(let btn of allBtns) {
                    btn.disabled = true;
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                }
            } else if (currentMode === 'sentences') {
                document.getElementById('sentence-feedback-msg').textContent = "時間到！";
                document.getElementById('sentence-feedback-msg').className = "font-bold h-6 text-xl text-red-500";
            }

            setTimeout(nextQuestion, 2000);
        }

        function startGame(mode, categoryId) {
            currentMode = mode;
            currentCategoryData = database[mode].find(c => c.id === categoryId);
            currentQuestionIndex = 0;
            score = 0;
            totalQuestions = currentCategoryData.questions.length;
            isProcessing = false;
            wrongAnswers = []; // 新回合清空錯題

            updateUIHeader();
            switchView(mode);
            loadQuestion();
        }

        function updateUIHeader() {
            uiElements.progress.textContent = `${currentQuestionIndex + 1} / ${totalQuestions}`;
            uiElements.score.textContent = score;
        }

        function loadQuestion() {
            isProcessing = false;
            currentQuestionAttempted = false; // 每題開始重置嘗試狀態
            updateUIHeader();
            startTimer();
            const q = currentCategoryData.questions[currentQuestionIndex];

            if (currentMode === 'vocab') {
                document.getElementById('vocab-en-text').textContent = q.en;
                const optsContainer = document.getElementById('vocab-options');
                optsContainer.innerHTML = q.options.map(opt => 
                    `<button onclick="handleMultipleChoice(this, '${opt}', '${q.zh}')" class="py-5 px-6 rounded-2xl text-xl font-bold border-2 bg-white border-blue-100 hover:border-blue-400 hover:bg-blue-50 text-slate-700 transition-all duration-200">${opt}</button>`
                ).join('');
                setTimeout(() => speak(q.en), 300);
            } 
            else if (currentMode === 'phonics') {
                const optsContainer = document.getElementById('phonics-options');
                optsContainer.innerHTML = q.options.map(opt => 
                    `<button onclick="handleMultipleChoice(this, '${opt}', '${q.word}')" class="py-6 px-10 rounded-2xl text-3xl font-bold border-2 bg-white border-orange-100 hover:border-orange-400 hover:bg-orange-50 text-slate-700 transition-all duration-200 tracking-wider w-full sm:w-auto min-w-[160px]">${opt}</button>`
                ).join('');
                setTimeout(() => speak(q.word), 300);
            }
            else if (currentMode === 'sentences') {
                document.getElementById('sentence-zh-text').textContent = q.zh;
                document.getElementById('sentence-feedback-msg').textContent = '';
                document.getElementById('sentence-feedback-msg').className = 'font-bold h-6 text-lg';
                
                selectedWords = [];
                availableWords = [...q.words].sort(() => Math.random() - 0.5);
                renderSentenceAreas();
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < totalQuestions) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function handleMultipleChoice(btnElement, selectedOpt, correctOpt) {
            if (isProcessing) return;
            isProcessing = true;
            stopTimer();

            const allBtns = btnElement.parentElement.children;
            for(let btn of allBtns) {
                btn.disabled = true;
                btn.classList.add('opacity-70', 'cursor-not-allowed');
            }

            if (selectedOpt === correctOpt) {
                score++;
                uiElements.score.textContent = score;
                btnElement.className = "py-6 px-10 rounded-2xl text-3xl font-bold border-2 bg-emerald-100 border-emerald-500 text-emerald-800 transition-all duration-200 transform scale-105 w-full sm:w-auto min-w-[160px]";
                
                setTimeout(nextQuestion, 1200);
            } else {
                // 答錯，記錄到錯題本
                if (!currentQuestionAttempted) {
                    const q = currentCategoryData.questions[currentQuestionIndex];
                    wrongAnswers.push({
                        type: currentMode,
                        en: q.en || q.word,
                        zh: q.zh || "聽力測驗",
                        correct: correctOpt,
                        studentAns: selectedOpt
                    });
                    currentQuestionAttempted = true;
                }

                btnElement.className = "py-6 px-10 rounded-2xl text-3xl font-bold border-2 bg-red-50 border-red-300 text-red-500 transition-all duration-200 w-full sm:w-auto min-w-[160px]";
                
                for(let btn of allBtns) {
                    if(btn.textContent === correctOpt) {
                        btn.className = "py-6 px-10 rounded-2xl text-3xl font-bold border-2 bg-emerald-50 border-emerald-400 text-emerald-700 transition-all duration-200 border-dashed w-full sm:w-auto min-w-[160px]";
                    }
                }
                setTimeout(nextQuestion, 1800);
            }
        }

        function renderSentenceAreas() {
            const availArea = document.getElementById('sentence-available-area');
            const selArea = document.getElementById('sentence-selected-area');
            const checkBtn = document.getElementById('btn-check-sentence');

            availArea.innerHTML = availableWords.map((w, i) => 
                `<button onclick="selectWord(${i})" class="px-5 py-3 bg-white border-2 border-slate-200 text-slate-700 rounded-xl font-bold text-xl shadow-sm hover:border-emerald-400 hover:text-emerald-600 transition-colors transform hover:-translate-y-1">${w}</button>`
            ).join('');

            if(selectedWords.length === 0) {
                selArea.innerHTML = `<span class="text-emerald-400/70 font-bold">點擊下方的單字來組裝句子</span>`;
            } else {
                selArea.innerHTML = selectedWords.map((w, i) => 
                    `<button onclick="deselectWord(${i})" class="px-5 py-3 bg-emerald-600 text-white rounded-xl font-bold text-xl shadow-md hover:bg-emerald-700 transition-colors">${w}</button>`
                ).join('');
            }

            if(availableWords.length === 0) {
                checkBtn.disabled = false;
                checkBtn.className = "px-10 py-4 rounded-2xl font-bold text-xl w-full max-w-sm transition-all bg-indigo-600 text-white hover:bg-indigo-700 shadow-lg shadow-indigo-200 transform hover:scale-105";
            } else {
                checkBtn.disabled = true;
                checkBtn.className = "px-10 py-4 rounded-2xl font-bold text-xl w-full max-w-sm transition-all bg-slate-200 text-slate-400 cursor-not-allowed";
            }
        }

        function selectWord(index) {
            if(isProcessing) return;
            const word = availableWords.splice(index, 1)[0];
            selectedWords.push(word);
            renderSentenceAreas();
        }

        function deselectWord(index) {
            if(isProcessing) return;
            const word = selectedWords.splice(index, 1)[0];
            availableWords.push(word);
            renderSentenceAreas();
        }

        function checkSentenceAnswer() {
            if(isProcessing) return;
            isProcessing = true;
            stopTimer();
            
            const q = currentCategoryData.questions[currentQuestionIndex];
            const studentAns = selectedWords.join(' ');
            const correctAns = q.words.join(' ');
            const msgEl = document.getElementById('sentence-feedback-msg');

            if (studentAns === correctAns) {
                // 如果是第一次就答對才給分
                if (!currentQuestionAttempted) {
                    score++;
                    uiElements.score.textContent = score;
                }
                
                msgEl.textContent = "完全正確！太棒了！";
                msgEl.className = "font-bold h-6 text-xl text-emerald-500 animate-bounce";
                speak(correctAns); 
                setTimeout(nextQuestion, 2000);
            } else {
                // 第一次答錯，記錄錯題
                if (!currentQuestionAttempted) {
                    wrongAnswers.push({
                        type: currentMode,
                        zh: q.zh,
                        correct: correctAns,
                        studentAns: studentAns
                    });
                    currentQuestionAttempted = true; // 標記已錯過，重排答對也不給分
                }

                msgEl.textContent = "順序好像不對喔，退回重排！";
                msgEl.className = "font-bold h-6 text-xl text-red-500";
                
                const selArea = document.getElementById('sentence-selected-area');
                selArea.classList.add('border-red-400', 'bg-red-50');
                
                setTimeout(() => {
                    selArea.classList.remove('border-red-400', 'bg-red-50');
                    availableWords = [...availableWords, ...selectedWords];
                    selectedWords = [];
                    msgEl.textContent = "";
                    isProcessing = false;
                    renderSentenceAreas();
                    startTimer(); // 退回重排後，重新開始計時
                }, 1500);
            }
        }

        function showResult() {
            stopTimer();
            switchView('result');
            document.getElementById('result-score').textContent = score;
            document.getElementById('result-total').textContent = totalQuestions;
            
            const iconEl = document.getElementById('result-icon');
            const titleEl = document.getElementById('result-title');
            const btnReview = document.getElementById('btn-review-mistakes');
            
            if (score === totalQuestions) {
                iconEl.textContent = "🏆";
                titleEl.textContent = "太棒了！滿分過關！";
                iconEl.parentElement.classList.add('bg-yellow-200');
            } else if (score >= totalQuestions / 2) {
                iconEl.textContent = "🌟";
                titleEl.textContent = "表現不錯！繼續保持！";
                iconEl.parentElement.classList.remove('bg-yellow-200');
            } else {
                iconEl.textContent = "💪";
                titleEl.textContent = "再接再厲！你一定可以！";
                iconEl.parentElement.classList.remove('bg-yellow-200');
            }

            // 如果有錯題，顯示檢討按鈕
            if (wrongAnswers.length > 0) {
                btnReview.classList.remove('hidden-view');
            } else {
                btnReview.classList.add('hidden-view');
            }
        }

        function showReview() {
            switchView('review');
            const container = document.getElementById('review-container');
            
            container.innerHTML = wrongAnswers.map((item) => {
                if (item.type === 'vocab') {
                    return `
                        <div class="bg-white border-l-8 border-blue-400 p-5 rounded-2xl shadow-md">
                            <span class="inline-block px-2 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded mb-2">單字題</span>
                            <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-2">
                                <span class="text-2xl font-black text-slate-800">${item.en}</span>
                                <div class="text-right">
                                    <span class="text-lg font-bold text-emerald-600 block">✅ ${item.correct}</span>
                                    <span class="text-sm font-bold text-red-400 line-through">❌ ${item.studentAns}</span>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (item.type === 'phonics') {
                    return `
                        <div class="bg-white border-l-8 border-orange-400 p-5 rounded-2xl shadow-md">
                            <span class="inline-block px-2 py-1 bg-orange-100 text-orange-700 text-xs font-bold rounded mb-2">聽力題</span>
                            <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-4">
                                <button onclick="speak('${item.correct}')" class="w-full sm:w-auto px-4 py-2 bg-orange-100 text-orange-700 rounded-xl hover:bg-orange-200 font-bold flex items-center justify-center gap-2 transition-colors">
                                    🔊 點擊重聽
                                </button>
                                <div class="text-right">
                                    <span class="text-lg font-bold text-emerald-600 block">✅ ${item.correct}</span>
                                    <span class="text-sm font-bold text-red-400 line-through">❌ ${item.studentAns}</span>
                                </div>
                            </div>
                        </div>
                    `;
                } else if (item.type === 'sentences') {
                    return `
                        <div class="bg-white border-l-8 border-emerald-400 p-5 rounded-2xl shadow-md">
                            <span class="inline-block px-2 py-1 bg-emerald-100 text-emerald-700 text-xs font-bold rounded mb-2">句型題</span>
                            <p class="text-slate-600 font-bold mb-3">${item.zh}</p>
                            <div class="bg-emerald-50 p-3 rounded-xl mb-2">
                                <span class="text-sm text-emerald-600 font-bold block mb-1">正確順序：</span>
                                <span class="text-lg font-bold text-emerald-800">${item.correct}</span>
                            </div>
                            <div class="bg-red-50 p-3 rounded-xl">
                                <span class="text-sm text-red-500 font-bold block mb-1">你的答案：</span>
                                <span class="text-md font-bold text-red-700">${item.studentAns}</span>
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        function renderMenu() {
            const createBtn = (cat, mode, colorClass, hoverClass) => `
                <button onclick="startGame('${mode}', '${cat.id}')" class="w-full text-left px-5 py-4 ${colorClass} ${hoverClass} rounded-2xl font-bold transition-all duration-200 shadow-sm flex justify-between items-center group">
                    <span>${cat.category}</span>
                    <span class="opacity-0 group-hover:opacity-100 transition-opacity">➡️</span>
                </button>
            `;

            document.getElementById('menu-vocab-container').innerHTML = 
                database.vocab.map(c => createBtn(c, 'vocab', 'bg-blue-50 text-blue-700', 'hover:bg-blue-600 hover:text-white')).join('');
            
            document.getElementById('menu-phonics-container').innerHTML = 
                database.phonics.map(c => createBtn(c, 'phonics', 'bg-orange-50 text-orange-700', 'hover:bg-orange-500 hover:text-white')).join('');
            
            document.getElementById('menu-sentences-container').innerHTML = 
                database.sentences.map(c => createBtn(c, 'sentences', 'bg-emerald-50 text-emerald-700', 'hover:bg-emerald-600 hover:text-white')).join('');
        }

        window.onload = () => {
            renderMenu();
        };

    </script>
</body>
</html>
